<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circle">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>
  <!-- Hungarian flag bands clipped to circle -->
  <g clip-path="url(#circle)">
    <rect x="0" y="0" width="512" height="171" fill="#CE2939"/>
    <rect x="0" y="171" width="512" height="170" fill="#FFFFFF"/>
    <rect x="0" y="341" width="512" height="171" fill="#477050"/>
  </g>
  <!-- Subtle circle border -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="#333" stroke-width="6"/>
  <!-- "ifinta" text in green -->
  <text x="256" y="280" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="120" font-weight="bold" fill="#1B5E20" letter-spacing="2">ifinta</text>
</svg>
