<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istvan Finta - </title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <!-- PWA Manifest and Theme -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#17a2b8">
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ifinta">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div id="main"></div>
    <!-- Service Worker Registration with auto-reload on update -->
    <script>
        if ('serviceWorker' in navigator) {
            // 1. Listen for update signal from the SW
            navigator.serviceWorker.addEventListener('message', function(event) {
                if (event.data?.type === '__IFINTA_SW_UPDATED') {
                    window.__IFINTA_UPDATE_READY = true;
                    window.dispatchEvent(new CustomEvent('ifinta_update_available'));
                }
            });

            // 2. Register (not re-register) the SW.
            //    updateViaCache:'none' ensures the browser always fetches sw.js
            //    from the network, bypassing any HTTP cache or file lock.
            navigator.serviceWorker.register('/profil/sw.js', {
                scope: '/profil/',
                updateViaCache: 'none'
            }).then(function(reg) {
                console.log('[App] SW registered, scope:', reg.scope);
                // Kick off an update check every time the page loads
                reg.update();
            });
        }
    </script>
</body>
</html>
