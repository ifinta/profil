<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istvan Finta - </title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <!-- PWA Manifest and Theme -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#17a2b8">
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ifinta">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- App version — stamped by build.sh; must precede SW registration -->
    <script>window.__APP_VERSION = '';</script>
</head>
<body>
    <div id="sw-update-banner" style="display:none; position:fixed; top:0; left:0; width:100%;
 background:#17a2b8; color:#fff; text-align:center; padding:18px 10px; z-index:99999;
 font-family:sans-serif; font-size:1.15rem; box-shadow:0 2px 8px rgba(0,0,0,0.25);">
        <span>A new version is available.</span>
        <button id="sw-refresh-btn" style="margin-left:16px; padding:8px 28px; font-size:1.1rem;
 border:none; border-radius:6px; background:#fff; color:#17a2b8; font-weight:bold;
 cursor:pointer;">Refresh</button>
    </div>
    <div id="main"></div>
    <!-- Service Worker Registration with version-aware update detection -->
    <script>
        if ('serviceWorker' in navigator) {
            function _showRefreshBanner() {
                var banner = document.getElementById('sw-update-banner');
                if (banner && banner.style.display !== 'block') {
                    banner.style.display = 'block';
                    console.log('[App] Update banner shown');
                }
            }

            document.getElementById('sw-refresh-btn').addEventListener('click', function() {
                window.location.reload();
            });

            // Only show the banner when the SW version differs from the page version.
            function _checkVersionAndNotify(swVersion) {
                if (!swVersion) return;
                if (window.__APP_VERSION && swVersion === window.__APP_VERSION) {
                    console.log('[App] SW version matches page — no refresh needed');
                    return;
                }
                console.log('[App] SW', swVersion, '≠ page', window.__APP_VERSION);
                _showRefreshBanner();
            }

            // 1. Listen for update signal from the SW
            navigator.serviceWorker.addEventListener('message', function(event) {
                if (event.data?.type === '__IFINTA_SW_UPDATED') {
                    _checkVersionAndNotify(event.data.version);
                }
            });

            // 2. When a new SW takes control, verify versions match
            navigator.serviceWorker.addEventListener('controllerchange', function() {
                if (!navigator.serviceWorker.controller) return;
                var ch = new MessageChannel();
                ch.port1.onmessage = function(e) {
                    if (e.data && e.data.version) {
                        _checkVersionAndNotify(e.data.version);
                    }
                };
                navigator.serviceWorker.controller.postMessage(
                    { type: 'GET_VERSION' }, [ch.port2]
                );
            });

            // 3. Register the SW
            navigator.serviceWorker.register('/profil/sw.js', {
                scope: '/profil/',
                updateViaCache: 'none'
            }).then(function(reg) {
                console.log('[App] SW registered, scope:', reg.scope);
                reg.update();

                // Re-check for updates whenever the tab becomes visible
                document.addEventListener('visibilitychange', function() {
                    if (document.visibilityState === 'visible') reg.update();
                });
            });

            // Query the SW for its CACHE_NAME and expose it to the app
            navigator.serviceWorker.ready.then(function() {
                if (!navigator.serviceWorker.controller) return;
                var ch = new MessageChannel();
                ch.port1.onmessage = function(e) {
                    if (e.data && e.data.version) {
                        window.__PROFIL_SW_VERSION = e.data.version;
                    }
                };
                navigator.serviceWorker.controller.postMessage(
                    { type: 'GET_VERSION' }, [ch.port2]
                );
            });
        }
    </script>
</body>
</html>
